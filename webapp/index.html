<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weather App</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="root">
    <header>
      <h1>Weather App</h1>
      <div class="search-box">
        <input id="location-input" type="text" placeholder="Enter city name or coordinates (lat,lon)" />
        <button id="search-btn" type="button">Get Weather</button>
      </div>
      <p id="error-banner" class="error-banner hidden"></p>
    </header>

    <section class="clocks">
      <div class="device-clock">
        <canvas id="device-clock-canvas" width="140" height="140"></canvas>
        <span class="clock-label">Your time</span>
      </div>
      <div id="city-time" class="city-time hidden"></div>
    </section>

    <section class="current-weather">
      <div class="main-weather">
        <img id="weather-icon" class="weather-icon" alt="" />
        <div class="temp-desc">
          <div id="temperature" class="temperature">--°C</div>
          <div id="description" class="description">Select a location</div>
        </div>
      </div>
      <div class="details-grid">
        <span id="feels-like">Feels like: --°C</span>
        <span id="humidity">Humidity: --%</span>
        <span id="wind-speed">Wind: -- km/h</span>
        <span id="pressure">Pressure: -- hPa</span>
      </div>
    </section>

    <section class="forecast-section">
      <h2>5-Day Forecast</h2>
      <div id="forecast-container" class="forecast-container"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
